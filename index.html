<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO & Social -->
  <title>ubicame.info PULSE — Vive la energía de Montañita</title>
  <meta name="description"
    content="Descubre eventos, negocios y la mejor vibra de Montañita y la costa del Pacífico ecuatoriano. Tu guía local en tiempo real.">
  <meta name="theme-color" content="#0f172a">
  <meta property="og:title" content="ubicame.info PULSE — Vive la energía de Montañita">
  <meta property="og:description" content="Descubre eventos, negocios y la mejor vibra de Montañita.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://montapulse-app.web.app/">

  <!-- Preconnect para recursos externos (reduce latencia de primera carga) -->
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts: Inter (cargado de forma no bloqueante) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  </noscript>

  <!-- Leaflet CSS — versión fijada con integrity para seguridad y caché CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: #0f172a;
      /* Slate 900 */
      color: #f8fafc;
      /* Slate 50 */
      /* Inter en lugar del fallback del sistema */
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #root {
      height: 100vh;
      width: 100vw;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      background-color: #1e293b;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
